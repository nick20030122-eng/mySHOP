<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 관리 — 모닝브루 관리자</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:    #5c3d2e;
      --cream:    #fdf6ee;
      --warm:     #f5ede0;
      --accent:   #c47c3a;
      --text:     #2d2014;
      --muted:    #8a7060;
      --white:    #ffffff;
      --danger:   #c0392b;
      --danger-lt:#fdf0ee;
      --success:  #2e7d32;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── 잠금 오버레이 ── */
    #lock-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, #1a0f07 0%, #3b2314 60%, #6b3f25 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 1.5rem;
    }

    .lock-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .lock-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .lock-card h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.4rem;
      color: var(--white);
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .lock-card p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1.75rem;
    }

    .lock-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    #admin-password {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 0.75rem;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.15em;
    }
    #admin-password::placeholder {
      color: rgba(255,255,255,0.3);
      letter-spacing: 0;
    }
    #admin-password:focus {
      border-color: var(--accent);
    }
    #admin-password.error {
      border-color: var(--danger);
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    .lock-error {
      font-size: 0.78rem;
      color: #f87171;
      display: none;
    }
    .lock-error.show { display: block; }

    #lock-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 0.75rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(196,124,58,0.4);
      transition: opacity 0.15s, transform 0.15s;
    }
    #lock-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #lock-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 관리자 콘텐츠 ── */
    #admin-content { display: none; }

    header {
      background: linear-gradient(135deg, #1a0f07 0%, #3b2314 100%);
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }
    .header-badge {
      display: inline-block;
      background: rgba(196,124,58,0.25);
      color: #f5c99a;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(196,124,58,0.4);
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: var(--white);
      font-weight: 700;
    }
    header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.55);
      margin-top: 0.35rem;
    }
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.6rem;
    }
    .back-link {
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.85); }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.45);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.4); }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card {
      background: var(--white);
      border-radius: 1.25rem;
      padding: 1.75rem;
      box-shadow: 0 2px 16px rgba(92,61,46,0.08);
    }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .summary-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1.5px solid transparent;
    }
    .chip-all      { background: var(--warm);  color: var(--brown);  border-color: #e0cbb8; }
    .chip-pending  { background: #fff8e1; color: #b45309; border-color: #fcd34d; }
    .chip-confirmed{ background: #e8f5e9; color: #2e7d32; border-color: #a7d7a9; }
    .chip-cancelled{ background: #fdf0ee; color: #c0392b; border-color: #f5b7b1; }

    #reservation-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .loading-state, .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

    .reservation-item {
      background: var(--warm);
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 0.85rem;
    }
    .item-index {
      width: 2rem;
      height: 2rem;
      background: var(--accent);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }
    .item-name { font-weight: 700; font-size: 0.97rem; color: var(--brown); }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 0.85rem;
      margin-bottom: 0.5rem;
    }
    .item-meta span { font-size: 0.8rem; color: var(--muted); }
    .item-note {
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.4rem 0.7rem;
      background: rgba(92,61,46,0.06);
      border-left: 3px solid var(--accent);
      border-radius: 0 0.4rem 0.4rem 0;
      font-style: italic;
      margin-bottom: 0.6rem;
    }
    .item-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .status-select {
      padding: 0.3rem 0.6rem;
      border: 1.5px solid #e8d8c8;
      border-radius: 0.5rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      background: var(--white);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .status-select:focus { border-color: var(--accent); }

    .btn-delete {
      padding: 0.3rem 0.75rem;
      background: var(--white);
      color: var(--danger);
      border: 1.5px solid #e8c8c4;
      border-radius: 0.5rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      margin-left: auto;
    }
    .btn-delete:hover { background: var(--danger-lt); border-color: var(--danger); }

    .btn-reset {
      margin-left: auto;
      padding: 0.3rem 0.75rem;
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #e8c8c4;
      border-radius: 0.5rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-reset:hover { background: var(--danger-lt); border-color: var(--danger); }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 700;
      min-width: 1.4rem;
      height: 1.4rem;
      border-radius: 999px;
      padding: 0 0.4rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--brown);
      color: var(--white);
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9998;
      max-width: calc(100vw - 2rem);
      text-align: center;
      white-space: normal;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <!-- ── 잠금 화면 ── -->
  <div id="lock-overlay">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h2>관리자 인증</h2>
      <p>모닝브루 관리자 전용 페이지입니다.</p>
      <form id="lock-form" novalidate>
        <div class="lock-field">
          <input type="password" id="admin-password" placeholder="비밀번호 입력" autocomplete="current-password">
          <span class="lock-error" id="lock-error">비밀번호가 올바르지 않습니다.</span>
        </div>
        <button type="submit" id="lock-btn">확인</button>
      </form>
    </div>
  </div>

  <!-- ── 관리자 콘텐츠 ── -->
  <div id="admin-content">

    <header>
      <div class="header-badge">🔒 모닝브루 관리자</div>
      <h1>예약 관리</h1>
      <p>픽업 예약 목록 확인 및 상태 관리</p>
      <div class="header-actions">
        <a href="./index.html" class="back-link">← 카페 홈으로</a>
        <button class="logout-btn" id="logout-btn">로그아웃</button>
      </div>
    </header>

    <main>

      <div class="card" id="summary-card" style="display:none;">
        <div class="summary-bar">
          <span class="summary-chip chip-all">전체 <span id="cnt-all">0</span>건</span>
          <span class="summary-chip chip-pending">대기중 <span id="cnt-pending">0</span></span>
          <span class="summary-chip chip-confirmed">확정됨 <span id="cnt-confirmed">0</span></span>
          <span class="summary-chip chip-cancelled">취소됨 <span id="cnt-cancelled">0</span></span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          🗓️ 예약 목록
          <span class="count-badge" id="count-badge">0</span>
          <button class="btn-reset" id="btn-reset" style="display:none;">전체 초기화</button>
        </div>
        <div id="reservation-list">
          <div class="loading-state">불러오는 중...</div>
        </div>
      </div>

    </main>

    <footer>© 2026 모닝브루 Morning Brew — 관리자 전용</footer>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── 상태 맵 ──
    const STATUS_MAP = {
      pending:   { label: '대기중', bg: '#fff8e1', color: '#b45309' },
      confirmed: { label: '확정됨', bg: '#e8f5e9', color: '#2e7d32' },
      cancelled: { label: '취소됨', bg: '#fdf0ee', color: '#c0392b' },
    };
    function getStatus(s) { return STATUS_MAP[s] || STATUS_MAP.pending; }

    const { createClient } = supabase;
    let db;

    // ── 잠금 화면 ──
    const lockOverlay = document.getElementById('lock-overlay');
    const adminContent = document.getElementById('admin-content');
    const lockForm    = document.getElementById('lock-form');
    const lockBtn     = document.getElementById('lock-btn');
    const lockError   = document.getElementById('lock-error');
    const pwInput     = document.getElementById('admin-password');

    // 세션 내 인증 유지
    if (sessionStorage.getItem('mb_admin') === '1') {
      unlockAdmin();
    }

    lockForm.addEventListener('submit', async e => {
      e.preventDefault();
      const password = pwInput.value;
      if (!password) return;

      lockBtn.disabled = true;
      lockBtn.textContent = '확인 중...';
      lockError.classList.remove('show');
      pwInput.classList.remove('error');

      let ok = false;
      try {
        const res = await fetch('/api/check-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        ({ ok } = await res.json());
      } catch {
        ok = false;
      }

      if (ok) {
        sessionStorage.setItem('mb_admin', '1');
        unlockAdmin();
      } else {
        pwInput.classList.add('error');
        lockError.classList.add('show');
        pwInput.value = '';
        pwInput.focus();
        lockBtn.disabled = false;
        lockBtn.textContent = '확인';
      }
    });

    // 입력 시 에러 해제
    pwInput.addEventListener('input', () => {
      pwInput.classList.remove('error');
      lockError.classList.remove('show');
    });

    function unlockAdmin() {
      lockOverlay.style.display = 'none';
      adminContent.style.display = 'block';
      initAndLoad();
    }

    // 로그아웃
    document.getElementById('logout-btn').addEventListener('click', () => {
      sessionStorage.removeItem('mb_admin');
      location.reload();
    });

    // ── Supabase 초기화 ──
    async function initAndLoad() {
      try {
        const { supabaseUrl, supabaseKey } = await fetch('/api/config').then(r => r.json());
        db = createClient(supabaseUrl, supabaseKey);
        await loadReservations();
      } catch {
        document.getElementById('reservation-list').innerHTML =
          '<div class="loading-state">서버 연결에 실패했습니다. 새로고침 해주세요.</div>';
      }
    }

    // ── DOM 참조 ──
    const listEl      = document.getElementById('reservation-list');
    const countEl     = document.getElementById('count-badge');
    const btnReset    = document.getElementById('btn-reset');
    const summaryCard = document.getElementById('summary-card');
    const toastEl     = document.getElementById('toast');

    let reservations = [];

    async function loadReservations() {
      const { data, error } = await db
        .from('reservations')
        .select('*')
        .order('id', { ascending: false });

      if (error) {
        listEl.innerHTML = '<div class="loading-state">목록을 불러오지 못했습니다.</div>';
        return;
      }
      reservations = data || [];
      render();
    }

    async function updateStatus(id, newStatus) {
      const { error } = await db
        .from('reservations')
        .update({ status: newStatus })
        .eq('id', id);

      if (error) { showToast('상태 변경에 실패했습니다.', 'error'); return; }
      const item = reservations.find(r => r.id === id);
      if (item) item.status = newStatus;
      render();
      showToast('상태가 변경됐습니다.');
    }

    async function deleteReservation(id) {
      const target = reservations.find(r => r.id === id);
      const { error } = await db.from('reservations').delete().eq('id', id);
      if (error) { showToast('삭제에 실패했습니다.', 'error'); return; }
      if (target) showToast(`${target.name}님 예약을 삭제했습니다.`);
      await loadReservations();
    }

    btnReset.addEventListener('click', async () => {
      if (!confirm('모든 예약을 삭제하시겠습니까?')) return;
      const { error } = await db.from('reservations').delete().gte('id', 0);
      if (error) { showToast('초기화에 실패했습니다.', 'error'); return; }
      showToast('전체 예약이 초기화됐습니다.');
      await loadReservations();
    });

    function render() {
      countEl.textContent = reservations.length;
      btnReset.style.display = reservations.length > 0 ? 'block' : 'none';
      summaryCard.style.display = reservations.length > 0 ? 'block' : 'none';

      document.getElementById('cnt-all').textContent = reservations.length;
      document.getElementById('cnt-pending').textContent =
        reservations.filter(r => !r.status || r.status === 'pending').length;
      document.getElementById('cnt-confirmed').textContent =
        reservations.filter(r => r.status === 'confirmed').length;
      document.getElementById('cnt-cancelled').textContent =
        reservations.filter(r => r.status === 'cancelled').length;

      if (reservations.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">☕</span>
            <div>아직 예약이 없습니다</div>
          </div>`;
        return;
      }

      listEl.innerHTML = reservations.map((r, i) => {
        const st = getStatus(r.status);
        const cur = r.status || 'pending';
        return `
          <div class="reservation-item" data-id="${r.id}">
            <div class="item-row">
              <div class="item-index">${i + 1}</div>
              <div class="item-body">
                <div class="item-top">
                  <span class="item-name">${escHtml(r.name)}</span>
                  <span class="status-badge" style="background:${st.bg};color:${st.color};">${st.label}</span>
                </div>
                <div class="item-meta">
                  <span>📞 ${escHtml(r.phone)}</span>
                  <span>🕐 ${formatTime(r.time)}</span>
                  <span>👤 ${escHtml(String(r.guests))}명</span>
                </div>
                ${r.note ? `<div class="item-note">"${escHtml(r.note)}"</div>` : ''}
                <div class="item-actions">
                  <select class="status-select" onchange="updateStatus(${r.id}, this.value)">
                    <option value="pending"   ${cur === 'pending'   ? 'selected' : ''}>대기중</option>
                    <option value="confirmed" ${cur === 'confirmed' ? 'selected' : ''}>확정됨</option>
                    <option value="cancelled" ${cur === 'cancelled' ? 'selected' : ''}>취소됨</option>
                  </select>
                  <button class="btn-delete" onclick="deleteReservation(${r.id})">삭제</button>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function formatTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':');
      const hour = parseInt(h);
      const ampm = hour < 12 ? '오전' : '오후';
      return `${ampm} ${hour % 12 || 12}:${m}`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let toastTimer;
    function showToast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className = 'toast' + (type ? ' ' + type : '');
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
    }
  </script>

</body>
</html>
