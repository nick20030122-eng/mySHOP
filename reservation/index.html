<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>픽업 예약 — 모닝브루</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:    #5c3d2e;
      --cream:    #fdf6ee;
      --warm:     #f5ede0;
      --accent:   #c47c3a;
      --text:     #2d2014;
      --muted:    #8a7060;
      --white:    #ffffff;
      --danger:   #c0392b;
      --success:  #2e7d32;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #3b2314 0%, #6b3f25 100%);
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: #f5c99a;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: var(--white);
      font-weight: 700;
    }
    header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      margin-top: 0.35rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.78rem;
      text-decoration: none;
      margin-bottom: 0.75rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.9); }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
    }

    .card {
      background: var(--white);
      border-radius: 1.25rem;
      padding: 1.75rem;
      box-shadow: 0 2px 16px rgba(92,61,46,0.08);
    }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .field input,
    .field select,
    .field textarea {
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #e8d8c8;
      border-radius: 0.625rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }
    .field input::placeholder,
    .field textarea::placeholder { color: #c5aa96; }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196,124,58,0.15);
      background: var(--white);
    }
    .field input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
    }
    .error-msg {
      font-size: 0.75rem;
      color: var(--danger);
      display: none;
    }
    .field.has-error .error-msg { display: block; }

    .optional-label {
      font-weight: 400;
      color: #c5aa96;
      font-size: 0.75rem;
      margin-left: 0.25rem;
    }

    .btn-add {
      margin-top: 1.1rem;
      width: 100%;
      padding: 0.875rem;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 0.75rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(196,124,58,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-add:hover:not(:disabled) {
      box-shadow: 0 6px 22px rgba(196,124,58,0.45);
      transform: translateY(-1px);
    }
    .btn-add:active:not(:disabled) { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--brown);
      color: var(--white);
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      max-width: calc(100vw - 2rem);
      text-align: center;
      white-space: normal;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="back-link">← 카페 홈으로</a>
    <div class="header-badge">☕ 모닝브루 픽업 예약</div>
    <h1>픽업 예약</h1>
    <p>출근 전 커피, 대기 없이 픽업하세요</p>
  </header>

  <main>
    <div class="card">
      <div class="card-title">📋 예약하기</div>
      <form id="reservation-form" novalidate>
        <div class="form-grid">

          <div class="field" id="field-name">
            <label for="input-name">이름</label>
            <input type="text" id="input-name" placeholder="예) 김민준" maxlength="20">
            <span class="error-msg">이름을 입력해 주세요.</span>
          </div>

          <div class="field" id="field-phone">
            <label for="input-phone">연락처</label>
            <input type="tel" id="input-phone" placeholder="예) 010-1234-5678" maxlength="15">
            <span class="error-msg">연락처를 입력해 주세요.</span>
          </div>

          <div class="field" id="field-time">
            <label for="input-time">픽업 시간</label>
            <input type="time" id="input-time" min="08:00" max="19:30">
            <span class="error-msg">픽업 시간을 선택해 주세요.</span>
          </div>

          <div class="field" id="field-guests">
            <label for="input-guests">인원수</label>
            <select id="input-guests">
              <option value="">선택</option>
              <option value="1">1명</option>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
              <option value="5">5명 이상</option>
            </select>
            <span class="error-msg">인원수를 선택해 주세요.</span>
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <label for="input-note">
              요청사항 <span class="optional-label">(선택)</span>
            </label>
            <textarea id="input-note"
              placeholder="예) 아이스로 부탁드려요 / 컵 홀더 불필요 / 설탕 빼주세요"
              maxlength="200"
              rows="3"></textarea>
          </div>

        </div>
        <button type="submit" class="btn-add" id="btn-submit" disabled>연결 중...</button>
      </form>
    </div>
  </main>

  <footer>© 2026 모닝브루 Morning Brew</footer>
  <div class="toast" id="toast"></div>

  <script>
    const { createClient } = supabase;
    let db;

    async function initSupabase() {
      const { supabaseUrl, supabaseKey } = await fetch('/api/config').then(r => r.json());
      db = createClient(supabaseUrl, supabaseKey);
    }

    const form      = document.getElementById('reservation-form');
    const toastEl   = document.getElementById('toast');
    const btnSubmit = document.getElementById('btn-submit');

    const fName   = document.getElementById('input-name');
    const fPhone  = document.getElementById('input-phone');
    const fTime   = document.getElementById('input-time');
    const fGuests = document.getElementById('input-guests');
    const fNote   = document.getElementById('input-note');

    function validate() {
      let ok = true;
      const checks = [
        { field: 'field-name',   el: fName,   test: () => fName.value.trim() !== '' },
        { field: 'field-phone',  el: fPhone,  test: () => fPhone.value.trim() !== '' },
        { field: 'field-time',   el: fTime,   test: () => fTime.value !== '' },
        { field: 'field-guests', el: fGuests, test: () => fGuests.value !== '' },
      ];
      checks.forEach(({ field, el, test }) => {
        const wrap = document.getElementById(field);
        if (!test()) {
          wrap.classList.add('has-error');
          el.classList.add('error');
          ok = false;
        } else {
          wrap.classList.remove('has-error');
          el.classList.remove('error');
        }
      });
      return ok;
    }

    [fName, fPhone, fTime, fGuests].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        el.closest('.field').classList.remove('has-error');
      });
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (!validate()) return;

      const name = fName.value.trim();
      btnSubmit.disabled = true;
      btnSubmit.textContent = '처리 중...';

      const { error } = await db.from('reservations').insert({
        name,
        phone:  fPhone.value.trim(),
        time:   fTime.value,
        guests: fGuests.value,
        note:   fNote.value.trim() || null,
        status: 'pending',
      });

      btnSubmit.disabled = false;
      btnSubmit.textContent = '+ 예약하기';

      if (error) {
        showToast('잠시 후 다시 시도해주세요.', 'error');
        return;
      }

      showToast(`${name}님, 픽업 예약이 완료됐습니다! 모닝브루에서 따뜻하게 기다리고 있을게요 ☕`, 'success');
      form.reset();
    });

    let toastTimer;
    function showToast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className = 'toast' + (type ? ' ' + type : '');
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3500);
    }

    initSupabase().then(() => {
      btnSubmit.disabled = false;
      btnSubmit.textContent = '+ 예약하기';
    }).catch(() => {
      btnSubmit.textContent = '연결 실패';
      showToast('서버 연결에 실패했습니다. 새로고침 해주세요.', 'error');
    });
  </script>

</body>
</html>
