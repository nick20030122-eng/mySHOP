<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 관리 — 모닝브루</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brown:    #5c3d2e;
      --brown-lt: #8b5e3c;
      --cream:    #fdf6ee;
      --warm:     #f5ede0;
      --accent:   #c47c3a;
      --text:     #2d2014;
      --muted:    #8a7060;
      --white:    #ffffff;
      --danger:   #c0392b;
      --danger-lt:#fdf0ee;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #3b2314 0%, #6b3f25 100%);
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }
    .header-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      color: #f5c99a;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 0.6rem;
    }
    header h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: var(--white);
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      margin-top: 0.35rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: rgba(255,255,255,0.55);
      font-size: 0.78rem;
      text-decoration: none;
      margin-bottom: 0.75rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.9); }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 1.25rem;
      padding: 1.75rem;
      box-shadow: 0 2px 16px rgba(92,61,46,0.08);
    }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--brown);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    /* ── FORM ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .field label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .field input, .field select {
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #e8d8c8;
      border-radius: 0.625rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field input::placeholder { color: #c5aa96; }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196,124,58,0.15);
      background: var(--white);
    }
    .field input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
    }
    .error-msg {
      font-size: 0.75rem;
      color: var(--danger);
      display: none;
    }
    .field.has-error .error-msg { display: block; }

    .btn-add {
      margin-top: 1.1rem;
      width: 100%;
      padding: 0.875rem;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 0.75rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(196,124,58,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .btn-add:hover {
      box-shadow: 0 6px 22px rgba(196,124,58,0.45);
      transform: translateY(-1px);
    }
    .btn-add:active { transform: scale(0.98); }

    /* ── COUNT BADGE ── */
    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 700;
      min-width: 1.4rem;
      height: 1.4rem;
      border-radius: 999px;
      padding: 0 0.4rem;
      margin-left: auto;
    }

    /* ── RESERVATION LIST ── */
    #reservation-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .empty-icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .empty-state h3 {
      font-size: 0.97rem;
      font-weight: 700;
      color: var(--brown);
    }
    .empty-state p {
      font-size: 0.83rem;
      color: var(--muted);
      max-width: 22rem;
      line-height: 1.6;
    }

    /* ── RESERVATION ITEM ── */
    .reservation-item {
      background: var(--warm);
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: slideIn 0.22s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item-index {
      width: 2rem;
      height: 2rem;
      background: var(--accent);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .item-info {
      flex: 1;
      min-width: 0;
    }
    .item-name {
      font-weight: 700;
      font-size: 0.97rem;
      color: var(--brown);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 0.25rem;
    }
    .item-meta span {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .btn-delete {
      flex-shrink: 0;
      padding: 0.45rem 0.85rem;
      background: var(--white);
      color: var(--danger);
      border: 1.5px solid #e8c8c4;
      border-radius: 0.5rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-delete:hover {
      background: var(--danger-lt);
      border-color: var(--danger);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--brown);
      color: var(--white);
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 9999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── 전체 초기화 버튼 ── */
    .btn-reset {
      margin-left: auto;
      padding: 0.3rem 0.75rem;
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #e8c8c4;
      border-radius: 0.5rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-reset:hover {
      background: var(--danger-lt);
      border-color: var(--danger);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="back-link">← 카페 홈으로</a>
    <div class="header-badge">☕ 모닝브루 관리자</div>
    <h1>예약 관리</h1>
    <p>픽업 예약을 등록하고 목록을 확인하세요</p>
  </header>

  <main>

    <!-- 예약 입력 폼 -->
    <div class="card">
      <div class="card-title">📋 새 예약 추가</div>
      <form id="reservation-form" novalidate>
        <div class="form-grid">
          <div class="field" id="field-name">
            <label for="input-name">이름</label>
            <input type="text" id="input-name" placeholder="예) 김민준" maxlength="20">
            <span class="error-msg">이름을 입력해 주세요.</span>
          </div>
          <div class="field" id="field-phone">
            <label for="input-phone">연락처</label>
            <input type="tel" id="input-phone" placeholder="예) 010-1234-5678" maxlength="15">
            <span class="error-msg">연락처를 입력해 주세요.</span>
          </div>
          <div class="field" id="field-time">
            <label for="input-time">픽업 시간</label>
            <input type="time" id="input-time" min="08:00" max="19:30">
            <span class="error-msg">픽업 시간을 선택해 주세요.</span>
          </div>
          <div class="field" id="field-guests">
            <label for="input-guests">인원수</label>
            <select id="input-guests">
              <option value="">선택</option>
              <option value="1">1명</option>
              <option value="2">2명</option>
              <option value="3">3명</option>
              <option value="4">4명</option>
              <option value="5">5명 이상</option>
            </select>
            <span class="error-msg">인원수를 선택해 주세요.</span>
          </div>
        </div>
        <button type="submit" class="btn-add">+ 예약 추가</button>
      </form>
    </div>

    <!-- 예약 목록 -->
    <div class="card">
      <div class="card-title">
        🗓️ 예약 목록
        <span class="count-badge" id="count-badge">0</span>
        <button class="btn-reset" id="btn-reset" onclick="clearAll()" style="display:none;">전체 초기화</button>
      </div>
      <div id="reservation-list">
        <!-- 항목은 JS로 렌더링 -->
      </div>
    </div>

  </main>

  <footer>© 2026 모닝브루 Morning Brew</footer>

  <div class="toast" id="toast"></div>

  <script>
    // ── localStorage 키 ──
    const STORAGE_KEY = 'morningbrew_reservations';

    // ── localStorage 저장/불러오기 ──
    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations));
    }

    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    // ── 데이터 초기화 (localStorage에서 불러오기) ──
    let reservations = loadFromStorage();
    let nextId = reservations.length > 0
      ? Math.max(...reservations.map(r => r.id)) + 1
      : 1;

    // ── DOM 참조 ──
    const form      = document.getElementById('reservation-form');
    const listEl    = document.getElementById('reservation-list');
    const countEl   = document.getElementById('count-badge');
    const toastEl   = document.getElementById('toast');
    const btnReset  = document.getElementById('btn-reset');

    const fName   = document.getElementById('input-name');
    const fPhone  = document.getElementById('input-phone');
    const fTime   = document.getElementById('input-time');
    const fGuests = document.getElementById('input-guests');

    // ── 유효성 검사 ──
    function validate() {
      let ok = true;
      const checks = [
        { field: 'field-name',   el: fName,   test: () => fName.value.trim() !== '' },
        { field: 'field-phone',  el: fPhone,  test: () => fPhone.value.trim() !== '' },
        { field: 'field-time',   el: fTime,   test: () => fTime.value !== '' },
        { field: 'field-guests', el: fGuests, test: () => fGuests.value !== '' },
      ];
      checks.forEach(({ field, el, test }) => {
        const wrap = document.getElementById(field);
        if (!test()) {
          wrap.classList.add('has-error');
          el.classList.add('error');
          ok = false;
        } else {
          wrap.classList.remove('has-error');
          el.classList.remove('error');
        }
      });
      return ok;
    }

    // 입력 시 에러 즉시 해제
    [fName, fPhone, fTime, fGuests].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        el.closest('.field').classList.remove('has-error');
      });
    });

    // ── 예약 추가 ──
    form.addEventListener('submit', e => {
      e.preventDefault();
      if (!validate()) return;

      const item = {
        id:     nextId++,
        name:   fName.value.trim(),
        phone:  fPhone.value.trim(),
        time:   fTime.value,
        guests: fGuests.value,
      };
      reservations.push(item);
      saveToStorage();
      render();
      form.reset();
      showToast(`${item.name}님 예약이 추가됐습니다 ☕`);
    });

    // ── 예약 삭제 ──
    function deleteReservation(id) {
      const target = reservations.find(r => r.id === id);
      reservations = reservations.filter(r => r.id !== id);
      saveToStorage();
      render();
      if (target) showToast(`${target.name}님 예약을 삭제했습니다.`);
    }

    // ── 전체 초기화 ──
    function clearAll() {
      if (!confirm('모든 예약을 삭제하시겠습니까?')) return;
      reservations = [];
      nextId = 1;
      saveToStorage();
      render();
      showToast('전체 예약이 초기화됐습니다.');
    }

    // ── 렌더링 ──
    function render() {
      countEl.textContent = reservations.length;
      btnReset.style.display = reservations.length > 0 ? 'block' : 'none';

      if (reservations.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">☕</div>
            <h3>아직 예약이 없습니다</h3>
            <p>첫 예약을 추가해 보세요!<br>위 폼에 정보를 입력하고 '예약 추가' 버튼을 눌러주세요.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = reservations.map((r, i) => `
        <div class="reservation-item" data-id="${r.id}">
          <div class="item-index">${i + 1}</div>
          <div class="item-info">
            <div class="item-name">${escHtml(r.name)}</div>
            <div class="item-meta">
              <span>📞 ${escHtml(r.phone)}</span>
              <span>🕐 ${formatTime(r.time)}</span>
              <span>👤 ${escHtml(r.guests)}명</span>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteReservation(${r.id})">삭제</button>
        </div>
      `).join('');
    }

    // ── 유틸 ──
    function formatTime(t) {
      if (!t) return '';
      const [h, m] = t.split(':');
      const hour = parseInt(h);
      const ampm = hour < 12 ? '오전' : '오후';
      const h12  = hour % 12 || 12;
      return `${ampm} ${h12}:${m}`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    // ── 초기 렌더 (localStorage에서 불러온 데이터로 시작) ──
    render();
  </script>
</body>
</html>
